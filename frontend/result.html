<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recommendation Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🌾 Recommended Crops</h2>

    <div id="result"></div>
</div>

<script>
function getData() {
    const params = new URLSearchParams(window.location.search);
    const data = JSON.parse(decodeURIComponent(params.get("data")));

    const resultDiv = document.getElementById("result");

    let html = `
        <div class="card p-3 mb-4 shadow">
            <h5>Pincode: ${data.pincode}</h5>
            <h5>Season: ${data.season}</h5>
            <h5>Farm Size: ${data.farm_size} acres</h5>
        </div>
    `;

    data.recommended_crops.forEach(crop => {
        html += `
            <div class="card p-3 mb-3 shadow">
                <h4>${crop.crop}</h4>
                <p><strong>Confidence:</strong> ${crop.confidence}%</p>
                <p><strong>Reasons:</strong></p>
                <ul>
                    ${crop.reasons.map(r => `<li>${r}</li>`).join("")}
                </ul>
            </div>
        `;
    });

    resultDiv.innerHTML = html;
}

getData();
</script>

</body>
</html>
