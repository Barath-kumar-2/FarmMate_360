<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Irrigation Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">💧 Irrigation Requirement</h2>

    <div class="card p-4 shadow">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Pincode</label>
                <input type="text" id="pincode" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Crop Type</label>
                <input type="text" id="crop" class="form-control" placeholder="e.g. rice, wheat">
            </div>

            <div class="col-md-6 mb-3">
                <label>Season</label>
                <select id="season" class="form-control">
                    <option>Kharif</option>
                    <option>Rabi</option>
                    <option>Zaid</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Area (acres)</label>
                <input type="number" id="area" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Pump Flow Rate (litre/sec)</label>
                <input type="number" id="flow" class="form-control">
            </div>
        </div>

        <button onclick="predictIrrigation()" class="btn btn-success w-100">
            Predict Irrigation
        </button>

    </div>

    <!-- RESULT -->
    <div class="mt-4 text-center">
        <div id="result" class="card p-3 shadow d-none"></div>
    </div>

</div>

<script>
async function predictIrrigation() {

    const data = {
        pincode: document.getElementById("pincode").value,
        crop: document.getElementById("crop").value,
        season: document.getElementById("season").value,
        area: parseFloat(document.getElementById("area").value),
        flow: parseFloat(document.getElementById("flow").value)
    };

    const res = await fetch("/predict_irrigation", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    const resultDiv = document.getElementById("result");
    resultDiv.classList.remove("d-none");

    if (result.error) {
        resultDiv.innerHTML = `<span class="text-danger">${result.error}</span>`;
        return;
    }

    // Color coding
    let color = "text-success";
    if (result.level === "Medium") color = "text-warning";
    if (result.level === "High") color = "text-danger";

    resultDiv.innerHTML = `
        <h4 class="${color}">📊 Irrigation Level: ${result.level}</h4>
        <p>💧 Water Needed: <b>${result.water_litres}</b> litres</p>
        <p>⏱ Time Required: <b>${result.time_hours}</b> hours</p>

        <hr>

        <p>🌱 Soil pH: ${result.ph}</p>
        <p>💧 Soil Moisture: ${result.soil_moisture}%</p>

        <hr>

        <h5>🧠 Reasoning:</h5>
        <ul>
            ${result.reasons.map(r => `<li>${r}</li>`).join("")}
        </ul>
    `;
}
</script>

</body>
</html>
