<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🌾 Crop Recommendation</h2>

    <div class="card p-4 shadow">
        
        <!-- Pincode -->
        <div class="mb-3">
            <label class="form-label">Pincode</label>
            <input type="text" id="pincode" class="form-control" placeholder="Enter Pincode">
        </div>

        <!-- Season -->
        <div class="mb-3">
            <label class="form-label">Season</label>
            <select id="season" class="form-control">
                <option value="kharif">Kharif</option>
                <option value="rabi">Rabi</option>
                <option value="zaid">Zaid</option>
            </select>
        </div>

        <!-- Farm Size -->
        <div class="mb-3">
            <label class="form-label">Farm Size (in acres)</label>
            <input type="number" id="farm_size" class="form-control" placeholder="Enter farm size">
        </div>

        <!-- Button -->
        <button onclick="getRecommendation()" class="btn btn-success w-100">
            Get Recommendation
        </button>

        <!-- Loading -->
        <div class="mt-3 text-center" id="loading" style="display: none;">
            <p>Fetching recommendations...</p>
        </div>

        <!-- Error -->
        <div class="mt-3 text-center text-danger" id="error"></div>

    </div>
</div>

<script>
async function getRecommendation() {
    const pincode = document.getElementById("pincode").value.trim();
    const season = document.getElementById("season").value;
    const farm_size = document.getElementById("farm_size").value;

    const errorDiv = document.getElementById("error");
    errorDiv.innerText = "";

    // Basic validation
    if (!pincode || !season || !farm_size) {
        errorDiv.innerText = "Please fill all fields";
        return;
    }

    document.getElementById("loading").style.display = "block";

    try {
        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                pincode: pincode,
                season: season,
                farm_size: farm_size
            })
        });

        const data = await response.json();

        if (data.error) {
            throw new Error(data.error);
        }

        // Redirect to result page with data
        window.location.href =
            "result.html?data=" + encodeURIComponent(JSON.stringify(data));

    } catch (err) {
        errorDiv.innerText = "Error: " + err.message;
    } finally {
        document.getElementById("loading").style.display = "none";
    }
}
</script>

</body>
</html>
