<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🌾 Crop Recommendation</h2>

    <div class="card p-4 shadow">
        
        <div class="mb-3">
            <label>Pincode</label>
            <input type="text" id="pincode" class="form-control" placeholder="Enter Pincode">
        </div>

        <div class="mb-3">
            <label>Season</label>
            <select id="season" class="form-control">
                <option value="kharif">Kharif</option>
                <option value="rabi">Rabi</option>
                <option value="zaid">Zaid</option>
            </select>
        </div>

        <button onclick="getRecommendation()" class="btn btn-success w-100">
            Get Recommendation
        </button>

        <div class="mt-4 text-center">
            <h4 id="result"></h4>
        </div>

    </div>
</div>

<script>
async function getRecommendation() {
    const pincode = document.getElementById("pincode").value;
    const season = document.getElementById("season").value;

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            pincode: pincode,
            season: season
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "Recommended Crop: " + data.recommended_crop;
}
</script>

</body>
</html>
