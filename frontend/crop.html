<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .hero { background: linear-gradient(135deg, #2d6a4f, #1b4332); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; margin-bottom: 24px; }
        .card { border: none; border-radius: 16px; }
        .btn-success { background: #2d6a4f; border: none; border-radius: 10px; padding: 12px; font-size: 1rem; }
        .btn-success:hover { background: #1b4332; }
        .crop-card { border-left: 5px solid #2d6a4f; border-radius: 16px; background: white; }
        .crop-card.top { border-left-color: #f4a261; background: #fff8f0; }
        .confidence-bar { height: 10px; border-radius: 5px; background: #e9ecef; overflow: hidden; }
        .confidence-fill { height: 100%; background: linear-gradient(90deg, #2d6a4f, #52b788); border-radius: 5px; transition: width 0.6s ease; }
        .info-chip { background: #f0f4f8; border-radius: 10px; padding: 8px 14px; font-size: 0.85rem; }
    </style>
</head>

<body class="bg-light">

<div class="hero">
    <h2>🌾 Crop Recommendation</h2>
    <p class="mb-0 opacity-75">AI-powered crop suggestions for your farm</p>
</div>

<div class="container pb-5">

    <!-- FORM -->
    <div class="card p-4 shadow-sm mb-4" id="formCard">
        <div class="mb-3">
            <label class="form-label fw-semibold">📍 Pincode</label>
            <input type="text" id="pincode" class="form-control" placeholder="e.g. 600001" inputmode="numeric">
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">🗓 Season</label>
            <select id="season" class="form-select">
                <option value="kharif">Kharif</option>
                <option value="rabi">Rabi</option>
                <option value="zaid">Zaid</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">📐 Farm Size (acres)</label>
            <input type="number" id="farm_size" class="form-control" placeholder="e.g. 2" inputmode="decimal">
        </div>

        <div id="error" class="text-danger text-center fw-semibold mb-2"></div>

        <button onclick="getRecommendation()" class="btn btn-success w-100" id="recBtn">
            🌾 Get Recommendation
        </button>
    </div>

    <!-- RESULTS -->
    <div id="results" class="d-none">

        <!-- Info Strip -->
        <div class="d-flex flex-wrap gap-2 mb-3" id="infoStrip"></div>

        <!-- Best Crop Banner -->
        <div class="alert mb-3" style="background:#fff3cd; border-left: 5px solid #f4a261; border-radius:12px;" id="bestCrop"></div>

        <!-- Crop Cards -->
        <div id="cropCards"></div>

        <!-- Try Again -->
        <button onclick="resetForm()" class="btn btn-outline-success w-100 mt-2">🔄 Try Again</button>
    </div>

</div>

<script>
async function getRecommendation() {
    const pincode   = document.getElementById("pincode").value.trim();
    const season    = document.getElementById("season").value;
    const farm_size = document.getElementById("farm_size").value;
    const errorDiv  = document.getElementById("error");

    errorDiv.innerText = "";

    if (!pincode || !season || !farm_size) {
        errorDiv.innerText = "⚠️ Please fill all fields.";
        return;
    }

    const btn = document.getElementById("recBtn");
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Fetching...`;

    try {
        const response = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pincode, season, farm_size })
        });

        const data = await response.json();

        if (data.error) {
            errorDiv.innerText = "❌ " + data.error;
            return;
        }

        showResults(data);

    } catch (err) {
        errorDiv.innerText = "❌ Something went wrong. Please try again.";
    } finally {
        btn.disabled = false;
        btn.innerHTML = "🌾 Get Recommendation";
    }
}

function showResults(data) {
    // Hide form, show results
    document.getElementById("formCard").classList.add("d-none");
    document.getElementById("results").classList.remove("d-none");

    // Info strip
    document.getElementById("infoStrip").innerHTML = `
        <span class="info-chip">📍 ${data.district}</span>
        <span class="info-chip">🗓 ${data.season}</span>
        <span class="info-chip">🌡 ${data.used_values.weather.temperature}°C</span>
        <span class="info-chip">💧 ${data.used_values.weather.humidity}% humidity</span>
        <span class="info-chip">🌧 ${data.used_values.weather.rainfall}mm rain</span>
        <span class="info-chip">🌱 pH ${data.used_values.soil.ph}</span>
    `;

    // Best crop banner
    const best = data.recommended_crops[0];
    document.getElementById("bestCrop").innerHTML = `
        🏆 <strong>Best Crop: ${best.crop.toUpperCase()}</strong> — ${best.confidence}% confidence
    `;

    // Crop cards
    let cardsHTML = "";
    data.recommended_crops.forEach((crop, i) => {
        const isTop = i === 0;
        cardsHTML += `
            <div class="card p-3 mb-3 shadow-sm crop-card ${isTop ? 'top' : ''}">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="mb-0">${isTop ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '🌿'} ${crop.crop}</h5>
                    <span class="badge bg-success">${crop.confidence}%</span>
                </div>
                <div class="confidence-bar mb-2">
                    <div class="confidence-fill" style="width: ${crop.confidence}%"></div>
                </div>
                <ul class="mb-0 small text-muted">
                    ${crop.reasons.map(r => `<li>${r}</li>`).join("")}
                </ul>
            </div>
        `;
    });

    document.getElementById("cropCards").innerHTML = cardsHTML;
}

function resetForm() {
    document.getElementById("formCard").classList.remove("d-none");
    document.getElementById("results").classList.add("d-none");
    document.getElementById("error").innerText = "";
}
</script>

</body>
</html>
